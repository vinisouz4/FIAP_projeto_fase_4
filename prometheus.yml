global:
  scrape_interval: 15s       # coleta métricas a cada 15 segundos
  evaluation_interval: 15s

scrape_configs:

  - job_name: "fiap_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s     # API: coleta mais frequente

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false